<!DOCTYPE html>
<html>

<head>
<title></title>

<style>

body{
background:black;
color:white;
font-family:Arial;
}

.logo{
font-size:30px;
color:red;
padding:20px;
}

.row{
display:flex;
overflow-x:auto;
}

.poster{
width:150px;
margin:10px;
transition:0.3s;
}

.poster:hover{
transform:scale(1.2);
}

</style>

</head>

<body>

<div class="logo">VISON PLAY</div>

<h2>Trending Movies</h2>

<div class="row">

<img class="poster" src="poster1.jpg">
<img class="poster" src="poster2.jpg">
<img class="poster" src="poster3.jpg">

</div>

<h2>Hollywood Movies</h2>

<div class="row">

<img class="poster" src="poster4.jpg">
<img class="poster" src="poster5.jpg">

</div>

</body>
</html>
